name: Build and Deploy UI

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'scripts/**'
      - 'package*.json'
      - 'next.config.*'
      - 'Dockerfile'
      - 'tsconfig.json'
      - 'tailwind.config.*'
      - 'prisma/**'

concurrency:
  group: build-deploy
  cancel-in-progress: true

env:
  IMAGE: devintripp/deltaguard-ui

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate version tag
        id: version
        run: |
          # Use short SHA + timestamp for unique tags
          SHA=$(echo ${{ github.sha }} | cut -c1-7)
          TAG="sha-${SHA}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Building: ${TAG}"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ steps.version.outputs.tag }}
            ${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILDKIT_INLINE_CACHE=1

      - name: Update deployment manifest
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          sed -i "s|image: devintripp/deltaguard-ui:.*|image: devintripp/deltaguard-ui:${TAG}|" k8s/scanrook/deployment.yaml
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/scanrook/deployment.yaml
          git commit -m "deploy: auto-update UI to ${TAG} [skip ci]" || echo "No changes to commit"
          git push
