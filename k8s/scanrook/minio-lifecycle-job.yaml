# MinIO lifecycle rules configuration
# Weekly CronJob that ensures lifecycle (expiration) rules are set on buckets.
# - deltaguard (uploads) bucket: 7-day expiration (safety net — reaper handles precise cleanup)
# - reports bucket: 90-day expiration
apiVersion: batch/v1
kind: CronJob
metadata:
  name: minio-lifecycle
  labels:
    app: minio-lifecycle
spec:
  schedule: "0 3 * * 0"  # Weekly, Sunday at 3:00 AM UTC
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      backoffLimit: 1
      activeDeadlineSeconds: 300  # 5 min max
      template:
        metadata:
          labels:
            app: minio-lifecycle
        spec:
          restartPolicy: OnFailure
          dnsConfig:
            options:
              - name: ndots
                value: "1"
          containers:
            - name: mc
              image: minio/mc:latest
              command:
                - /bin/sh
                - -c
                - |
                  set -e
                  echo "Configuring MinIO client..."
                  mc alias set minio \
                    "http://${MINIO_ENDPOINT}" \
                    "${MINIO_ACCESS_KEY}" \
                    "${MINIO_SECRET_KEY}"

                  echo "Setting lifecycle rule on deltaguard (uploads) bucket (7-day expiration)..."
                  mc ilm rule add minio/deltaguard \
                    --expire-days 7 2>/dev/null || \
                  mc ilm rule add minio/deltaguard \
                    --expire-days 7 || true

                  echo "Setting lifecycle rule on reports bucket (90-day expiration)..."
                  mc ilm rule add minio/reports \
                    --expire-days 90 2>/dev/null || \
                  mc ilm rule add minio/reports \
                    --expire-days 90 || true

                  echo "Setting lifecycle rule on vulndb bucket (3-day expiration safety net)..."
                  mc ilm rule add minio/vulndb \
                    --expire-days 3 2>/dev/null || \
                  mc ilm rule add minio/vulndb \
                    --expire-days 3 || true

                  echo "Current lifecycle rules:"
                  echo "--- deltaguard (uploads) ---"
                  mc ilm rule ls minio/deltaguard || true
                  echo "--- reports ---"
                  mc ilm rule ls minio/reports || true
                  echo "--- vulndb ---"
                  mc ilm rule ls minio/vulndb || true
                  echo "Lifecycle configuration complete at $(date)"
              env:
                - name: MINIO_ENDPOINT
                  valueFrom:
                    secretKeyRef:
                      name: pg-backup-secrets
                      key: MINIO_ENDPOINT
                - name: MINIO_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: pg-backup-secrets
                      key: MINIO_ACCESS_KEY
                - name: MINIO_SECRET_KEY
                  valueFrom:
                    secretKeyRef:
                      name: pg-backup-secrets
                      key: MINIO_SECRET_KEY
              resources:
                limits:
                  cpu: 100m
                  memory: 128Mi
                requests:
                  cpu: 50m
                  memory: 64Mi
