apiVersion: batch/v1
kind: CronJob
metadata:
  name: schedules-cron
  namespace: scanrook
  labels:
    app: schedules-cron
spec:
  schedule: "*/5 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 2
  jobTemplate:
    spec:
      backoffLimit: 1
      activeDeadlineSeconds: 120
      template:
        metadata:
          labels:
            app: schedules-cron
        spec:
          restartPolicy: OnFailure
          dnsConfig:
            options:
              - name: ndots
                value: "1"
          containers:
            - name: trigger
              image: curlimages/curl:latest
              command:
                - /bin/sh
                - -c
                - |
                  set -e
                  echo "Triggering scheduled scans at $(date)..."
                  HTTP_CODE=$(curl -sf -o /dev/null -w "%{http_code}" \
                    -X POST \
                    -H "x-cleanup-secret: ${CLEANUP_SECRET}" \
                    -H "Content-Type: application/json" \
                    "http://scanrook-web.scanrook.svc:3000/api/cron/schedules")
                  echo "Response: ${HTTP_CODE}"
                  if [ "${HTTP_CODE}" -ge 400 ]; then
                    echo "ERROR: Schedule trigger failed with HTTP ${HTTP_CODE}"
                    exit 1
                  fi
                  echo "Scheduled scans triggered successfully"
              env:
                - name: CLEANUP_SECRET
                  valueFrom:
                    secretKeyRef:
                      name: scanrook-secrets
                      key: CLEANUP_SECRET
              resources:
                limits:
                  cpu: 50m
                  memory: 32Mi
                requests:
                  cpu: 10m
                  memory: 16Mi
