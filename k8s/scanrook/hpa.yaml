# HorizontalPodAutoscaler for scanrook-web (Phase 5.8)
# Requires metrics-server to be installed in the cluster.
# Conservative maxReplicas for a 3-node homelab cluster.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: scanrook-web
  labels:
    app: scanrook-web
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: scanrook-web
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300  # Wait 5 min before scaling down
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
