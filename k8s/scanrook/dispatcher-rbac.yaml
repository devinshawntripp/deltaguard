apiVersion: v1
kind: ServiceAccount
metadata:
  name: scanrook-dispatcher
  namespace: scanrook
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: scanrook-dispatcher
  namespace: scanrook
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list", "watch", "delete"]
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: scanrook-dispatcher
  namespace: scanrook
subjects:
  - kind: ServiceAccount
    name: scanrook-dispatcher
    namespace: scanrook
roleRef:
  kind: Role
  name: scanrook-dispatcher
  apiGroup: rbac.authorization.k8s.io
