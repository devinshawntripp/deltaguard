# Prometheus scrape configuration
# Lightweight config for homelab: 30s scrape interval, 7-day retention
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: monitoring
  labels:
    app: prometheus
data:
  prometheus.yml: |
    global:
      scrape_interval: 30s
      evaluation_interval: 30s

    scrape_configs:
      # Prometheus self-monitoring
      - job_name: "prometheus"
        static_configs:
          - targets: ["localhost:9090"]

      # Dispatcher pods /metrics endpoint
      - job_name: "scanrook-dispatcher"
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names:
                - scanrook
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app]
            action: keep
            regex: scanrook-dispatcher
          - source_labels: [__meta_kubernetes_pod_container_port_number]
            regex: "8080"
            action: keep

      # Kubernetes node metrics (kubelet)
      - job_name: "kubelet"
        scheme: https
        tls_config:
          insecure_skip_verify: true
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        kubernetes_sd_configs:
          - role: node
        relabel_configs:
          - action: labelmap
            regex: __meta_kubernetes_node_label_(.+)

      # Host metrics (node-exporter DaemonSet, hostNetwork, port 9100).
      # Required by the NodeRootFSHigh alert (node_filesystem_*).
      - job_name: "node-exporter"
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names:
                - monitoring
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app]
            action: keep
            regex: node-exporter
          - source_labels: [__meta_kubernetes_pod_container_port_number]
            action: keep
            regex: "9100"
          - source_labels: [__meta_kubernetes_pod_node_name]
            target_label: node

      # Kubernetes object state (kube-state-metrics, port 8080; 8081 is telemetry).
      # Required by the PodRestartStorm and PgEndpointsGone alerts.
      - job_name: "kube-state-metrics"
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names:
                - monitoring
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app]
            action: keep
            regex: kube-state-metrics
          - source_labels: [__meta_kubernetes_pod_container_port_number]
            action: keep
            regex: "8080"

      # Longhorn volume metrics (longhorn-manager DaemonSet, port 9500).
      # Required by the PVCUsageHigh/PVCUsageCritical alerts: kubelet on this
      # cluster (v1.34 + Longhorn CSI) does not expose kubelet_volume_stats_*,
      # so PVC usage comes from longhorn_volume_actual_size_bytes/_capacity_bytes.
      - job_name: "longhorn-manager"
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names:
                - longhorn-system
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app]
            action: keep
            regex: longhorn-manager
          - source_labels: [__meta_kubernetes_pod_container_port_number]
            action: keep
            regex: "9500"
          - source_labels: [__meta_kubernetes_pod_node_name]
            target_label: node
