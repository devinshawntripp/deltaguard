# Grafana deployment - single replica, lightweight for homelab
# Auto-provisioned with Prometheus and Loki data sources
---
apiVersion: v1
kind: Secret
metadata:
  name: grafana-admin
  namespace: monitoring
  labels:
    app: grafana
type: Opaque
stringData:
  admin-user: admin
  admin-password: scanrook-grafana-2026
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: monitoring
  labels:
    app: grafana
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        url: http://prometheus.monitoring.svc:9090
        access: proxy
        isDefault: true
        editable: true
      - name: Loki
        type: loki
        url: http://loki.monitoring.svc:3100
        access: proxy
        editable: true
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-provider
  namespace: monitoring
  labels:
    app: grafana
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: scanrook
        orgId: 1
        folder: ScanRook
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards
          foldersFromFilesStructure: false
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: monitoring
  labels:
    app: grafana
data:
  scanrook-scans.json: |
    {
      "dashboard": {
        "id": null,
        "uid": "scanrook-scans",
        "title": "ScanRook Scans",
        "tags": ["scanrook"],
        "timezone": "browser",
        "refresh": "30s",
        "time": { "from": "now-24h", "to": "now" },
        "panels": [
          {
            "id": 1,
            "title": "Scan Job Pod Duration",
            "type": "timeseries",
            "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
            "datasource": { "type": "loki", "uid": "loki" },
            "targets": [
              {
                "expr": "{namespace=\"scanrook\", container=\"runjob\"} |= \"scan completed\" | regexp \"duration=(?P<duration>[0-9.]+)s\"",
                "legendFormat": "{{pod}}"
              }
            ]
          },
          {
            "id": 2,
            "title": "Active Scan Pods by Tier",
            "type": "stat",
            "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
            "datasource": { "type": "prometheus", "uid": "prometheus" },
            "targets": [
              {
                "expr": "count(kube_pod_labels{namespace=\"scanrook\", label_app=\"scanrook-scan\"}) by (label_scanrook_io_tier)",
                "legendFormat": "{{label_scanrook_io_tier}}"
              }
            ]
          },
          {
            "id": 3,
            "title": "Scan Throughput (Jobs/Hour)",
            "type": "timeseries",
            "gridPos": { "h": 8, "w": 12, "x": 0, "y": 8 },
            "datasource": { "type": "loki", "uid": "loki" },
            "targets": [
              {
                "expr": "count_over_time({namespace=\"scanrook\", container=\"runjob\"} |= \"scan completed\" [1h])",
                "legendFormat": "completed/hour"
              }
            ]
          },
          {
            "id": 4,
            "title": "Scan Pod Resource Usage",
            "type": "timeseries",
            "gridPos": { "h": 8, "w": 12, "x": 12, "y": 8 },
            "datasource": { "type": "prometheus", "uid": "prometheus" },
            "targets": [
              {
                "expr": "sum(container_memory_working_set_bytes{namespace=\"scanrook\", container=\"runjob\"}) by (pod)",
                "legendFormat": "{{pod}} memory"
              }
            ]
          },
          {
            "id": 5,
            "title": "Dispatcher Events",
            "type": "logs",
            "gridPos": { "h": 8, "w": 24, "x": 0, "y": 16 },
            "datasource": { "type": "loki", "uid": "loki" },
            "targets": [
              {
                "expr": "{namespace=\"scanrook\", container=\"dispatcher\"}"
              }
            ]
          }
        ],
        "schemaVersion": 39,
        "version": 1
      }
    }
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: grafana-data
  namespace: monitoring
  labels:
    app: grafana
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: monitoring
  labels:
    app: grafana
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 472
        fsGroup: 472
      dnsConfig:
        options:
          - name: ndots
            value: "1"
      containers:
        - name: grafana
          image: grafana/grafana:11.5.2
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: GF_SECURITY_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: grafana-admin
                  key: admin-user
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: grafana-admin
                  key: admin-password
            - name: GF_SERVER_ROOT_URL
              value: https://grafana.scanrook.io
            - name: GF_USERS_ALLOW_SIGN_UP
              value: "false"
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
          resources:
            limits:
              cpu: 200m
              memory: 256Mi
            requests:
              cpu: 50m
              memory: 128Mi
          volumeMounts:
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
              readOnly: true
            - name: dashboard-provider
              mountPath: /etc/grafana/provisioning/dashboards
              readOnly: true
            - name: dashboards
              mountPath: /var/lib/grafana/dashboards
              readOnly: true
            - name: data
              mountPath: /var/lib/grafana
      volumes:
        - name: datasources
          configMap:
            name: grafana-datasources
        - name: dashboard-provider
          configMap:
            name: grafana-dashboard-provider
        - name: dashboards
          configMap:
            name: grafana-dashboards
        - name: data
          persistentVolumeClaim:
            claimName: grafana-data
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: monitoring
  labels:
    app: grafana
spec:
  type: ClusterIP
  selector:
    app: grafana
  ports:
    - name: http
      port: 3000
      targetPort: http
