apiVersion: apps/v1
kind: Deployment
metadata:
  name: scanrook-web
  labels:
    app: scanrook-web
spec:
  replicas: 3
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: scanrook-web
  template:
    metadata:
      labels:
        app: scanrook-web
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: scanrook-web
                topologyKey: kubernetes.io/hostname
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      dnsConfig:
        options:
          - name: ndots
            value: "1"
      containers:
        - name: web
          image: devintripp/deltaguard-ui:sha-54e4d14
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: false  # Next.js needs writable /tmp
          ports:
            - containerPort: 3000
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: UPLOADS_DIR
              value: /var/uploads
            - name: PROGRESS_DIR
              value: /var/uploads/progress
            - name: HTTP_PROXY
              value: http://10.10.10.2:3128
            - name: HTTPS_PROXY
              value: http://10.10.10.2:3128
            - name: http_proxy
              value: http://10.10.10.2:3128
            - name: https_proxy
              value: http://10.10.10.2:3128
            - name: NO_PROXY
              value: .svc,.svc.cluster.local,.cluster.local,10.96.0.0/12,10.0.0.0/8,192.168.0.0/16,172.16.0.0/12,s3.apps.onetripp.com,minio.apps.onetripp.com,minio.storage.svc.cluster.local,minio.storage.svc.cluster.local.,10.101.41.11,10.10.10.241
            - name: no_proxy
              value: .svc,.svc.cluster.local,.cluster.local,10.96.0.0/12,10.0.0.0/8,192.168.0.0/16,172.16.0.0/12,s3.apps.onetripp.com,minio.apps.onetripp.com,minio.storage.svc.cluster.local,minio.storage.svc.cluster.local.,10.101.41.11,10.10.10.241
            - name: NEXT_PUBLIC_APP_URL
              value: https://scanrook.io
            - name: NEXT_PUBLIC_APP_NAME
              value: ScanRook
          envFrom:
            - secretRef:
                name: scanrook-secrets
            - configMapRef:
                name: scanrook-config
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            limits:
              cpu: "1"
              memory: 1Gi
            requests:
              cpu: 200m
              memory: 256Mi
          volumeMounts:
            - name: uploads
              mountPath: /var/uploads
      volumes:
        - name: uploads
          emptyDir: {}
