# Prometheus scrape configuration
# Lightweight config for homelab: 30s scrape interval, 7-day retention
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: monitoring
  labels:
    app: prometheus
data:
  prometheus.yml: |
    global:
      scrape_interval: 30s
      evaluation_interval: 30s

    scrape_configs:
      # Prometheus self-monitoring
      - job_name: "prometheus"
        static_configs:
          - targets: ["localhost:9090"]

      # Worker pods /metrics endpoint
      - job_name: "scanrook-worker"
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names:
                - deltaguard
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app]
            action: keep
            regex: scanrook-worker
          - source_labels: [__meta_kubernetes_pod_ip]
            action: replace
            target_label: __address__
            regex: (.+)
            replacement: $1:8080
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod

      # Web pods
      - job_name: "scanrook-web"
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names:
                - deltaguard
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app]
            action: keep
            regex: scanrook-web
          - source_labels: [__meta_kubernetes_pod_ip]
            action: replace
            target_label: __address__
            regex: (.+)
            replacement: $1:3000
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod

      # Kubernetes node metrics (kubelet)
      - job_name: "kubelet"
        scheme: https
        tls_config:
          insecure_skip_verify: true
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        kubernetes_sd_configs:
          - role: node
        relabel_configs:
          - action: labelmap
            regex: __meta_kubernetes_node_label_(.+)
