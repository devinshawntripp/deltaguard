apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: scanrook-monitoring
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/devinshawntripp/deltaguard.git
    targetRevision: main
    path: k8s/scanrook/monitoring
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
